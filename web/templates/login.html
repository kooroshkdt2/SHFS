<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - HFS</title>
<style>
body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f0f2f5}
.box{background:#fff;padding:3em;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;max-width:400px;width:100%}
h1{color:#47c;margin:0 0 1em}
input{display:block;width:100%;padding:0.6em;margin:0.5em 0;border:1px solid #ddd;border-radius:4px;font-size:14px}
button{width:100%;padding:0.6em;background:#47c;color:#fff;border:0;border-radius:4px;cursor:pointer;font-size:14px;margin-top:0.5em}
button:hover{background:#369}
.footer{font-size:11px;color:#999;margin-top:2em}
.error{color:#e74c3c;margin:0.5em 0}
</style>
</head>
<body>
<div class="box">
    <h1>{{.Realm}}</h1>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="post">
        <input type="text" name="username" placeholder="Username" autofocus required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div class="footer">{{.Version}}</div>
</div>
</body>
</html>
